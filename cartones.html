<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartones de Bingo Espaol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 30px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #636e72, #2d3436);
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .controls input {
            width: 60px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        /* Cartones - uno debajo del otro */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        /* CARTON */
        .bingo-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 4px solid #e74c3c;
            width: 100%;
            max-width: 450px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #bdc3c7;
        }

        .card-title {
            color: #e74c3c;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }

        .card-subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            font-style: italic;
        }

        .card-table {
            width: 100%;
            border-collapse: collapse;
            border: 3px solid #2c3e50;
        }

        .card-table th {
            background: linear-gradient(180deg, #e74c3c, #c0392b);
            color: white;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            border-right: 2px solid #a93226;
        }

        .card-table th:last-child {
            border-right: none;
        }

        .card-table td {
            border: 2px solid #bdc3c7;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            height: 75px;
            padding: 10px 5px;
            background: white;
        }

        .card-table td.empty {
            background: #ecf0f1;
        }

        .card-footer {
            text-align: center;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 3px solid #bdc3c7;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .card-id {
            font-weight: bold;
            color: #e74c3c;
        }

        /* Print */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                background: white;
                padding: 20px;
            }

            h1, .subtitle, .controls {
                display: none !important;
            }

            .container {
                max-width: 100%;
                padding: 0;
            }

            .cards-container {
                gap: 25px;
            }

            .bingo-card {
                width: 15cm;
                height: 7.5cm;
                border: 3px solid #000;
                border-radius: 10px;
                padding: 15px 12px;
                box-shadow: none;
                page-break-inside: avoid;
                break-inside: avoid;
            }

            .card-header {
                margin-bottom: 10px;
                padding-bottom: 8px;
                border-bottom: 3px solid #000;
            }

            .card-title {
                color: #000;
                font-size: 20px;
                letter-spacing: 4px;
                margin-bottom: 3px;
            }

            .card-subtitle {
                color: #333;
                font-size: 11px;
            }

            .card-table {
                border: 3px solid #000;
            }

            .card-table th {
                background: #444;
                color: white;
                padding: 8px 4px;
                font-size: 12px;
                border: 2px solid #000;
            }

            .card-table td {
                border: 2px solid #000;
                font-size: 18px;
                height: 40px;
                padding: 6px 3px;
                background: white;
                color: #000;
            }

            .card-table td.empty {
                background: #e0e0e0;
            }

            .card-footer {
                margin-top: 8px;
                padding-top: 5px;
                border-top: 3px solid #000;
                color: #333;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cartones de Bingo</h1>
        <p class="subtitle">Cartones estilo español - 3 filas x 9 columnas</p>

        <div class="controls">
            <a href="index.html" class="btn btn-secondary">Volver al Juego</a>
            <label>
                Cantidad:
                <input type="number" id="numCards" value="4" min="1" max="50">
            </label>
            <button class="btn btn-primary" onclick="generateCards()">Generar</button>
            <button class="btn btn-success" onclick="printCards()">Imprimir</button>
        </div>

        <div class="cards-container" id="cardsContainer"></div>
    </div>

    <script>
        const columnRanges = [
            { min: 1, max: 9 },
            { min: 10, max: 19 },
            { min: 20, max: 29 },
            { min: 30, max: 39 },
            { min: 40, max: 49 },
            { min: 50, max: 59 },
            { min: 60, max: 69 },
            { min: 70, max: 79 },
            { min: 80, max: 90 }
        ];

        document.addEventListener('DOMContentLoaded', generateCards);

        function generateCards() {
            const num = parseInt(document.getElementById('numCards').value) || 4;
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            for (let i = 0; i < num; i++) {
                renderCard(generateSingleCard(), i + 1, container);
            }
        }

        function generateSingleCard() {
            const card = [];
            for (let row = 0; row < 3; row++) {
                const rowNumbers = [];
                const cols = [0,1,2,3,4,5,6,7,8];
                shuffleArray(cols);
                const selected = cols.slice(0, 5).sort((a,b) => a - b);
                for (const col of selected) {
                    const r = columnRanges[col];
                    let n;
                    do { n = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min; }
                    while (isNumberInCard(card, n));
                    rowNumbers.push({ col, num: n });
                }
                for (let c = 0; c < 9; c++) {
                    if (!selected.includes(c)) rowNumbers.push({ col: c, num: null });
                }
                rowNumbers.sort((a,b) => a.col - b.col);
                card.push(rowNumbers);
            }
            return card;
        }

        function isNumberInCard(card, num) {
            return card.some(row => row.some(cell => cell.num === num));
        }

        function renderCard(card, num, container) {
            const div = document.createElement('div');
            div.className = 'bingo-card';
            const headers = ['1-9','10-19','20-29','30-39','40-49','50-59','60-69','70-79','80-90'];
            let html = `
                <div class="card-header">
                    <div class="card-title">BINGO</div>
                    <div class="card-subtitle">Carton N <span class="card-id">#${String(num).padStart(3,'0')}</span></div>
                </div>
                <table class="card-table">
                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>`;
            card.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    html += cell.num === null
                        ? '<td class="empty"></td>'
                        : `<td>${cell.num}</td>`;
                });
                html += '</tr>';
            });
            html += `</tbody></table>
                <div class="card-footer">Carton #${num} - Bingo Español</div>`;
            div.innerHTML = html;
            container.appendChild(div);
        }

        function printCards() { window.print(); }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
    </script>
</body>
</html>
